server:
  port: 9092
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mybatis_example?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis:
  # 指定 Mapper XML 文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名扫描包
  type-aliases-package: com.example.mybatis.entity
  configuration:
    # 开启下划线转驼峰
    map-underscore-to-camel-case: true
    # 配置日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
