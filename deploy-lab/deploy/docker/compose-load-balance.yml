services:
  backend-01:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_INSTANCE_ID: backend-01
      SERVER_PORT: 8080
      APP_VERSION: 1.0.0
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  backend-02:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_INSTANCE_ID: backend-02
      SERVER_PORT: 8080
      APP_VERSION: 1.0.0
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/conf.d/load-balance.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend-01:
        condition: service_healthy
      backend-02:
        condition: service_healthy

networks:
  default:
    name: deploy-lab-network
